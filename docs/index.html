<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Orcamento Engenharia Printbag</title>
  <style>
    :root {
      --bg1: #0f172a;
      --bg2: #111827;
      --card: rgba(255, 255, 255, 0.1);
      --text: #e5e7eb;
      --accent: #22d3ee;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: "Segoe UI", Tahoma, sans-serif;
      color: var(--text);
      background: radial-gradient(circle at 20% 10%, #1e293b 0, transparent 45%),
                  radial-gradient(circle at 80% 90%, #134e4a 0, transparent 35%),
                  linear-gradient(135deg, var(--bg1), var(--bg2));
      padding: 24px;
    }
    main {
      width: min(760px, 100%);
      background: var(--card);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 16px;
      padding: 32px;
      backdrop-filter: blur(8px);
      box-shadow: 0 12px 40px rgba(0,0,0,0.35);
    }
    h1 {
      margin: 0 0 10px;
      font-size: clamp(1.5rem, 4vw, 2.3rem);
      letter-spacing: 0.02em;
    }
    p {
      margin: 0 0 18px;
      line-height: 1.5;
      opacity: 0.92;
    }
    a {
      color: var(--accent);
      text-decoration: none;
      font-weight: 600;
    }
    a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <main>
    <h1>Orcamento Engenharia Printbag</h1>
    <p>Repositorio publicado com GitHub Pages para acesso online.</p>
    <p><a href="https://github.com/Levoratoo/orcamentoengenhariaprintbag" target="_blank" rel="noreferrer">Abrir repositório no GitHub</a></p>
  </main>
</body>
</html>
